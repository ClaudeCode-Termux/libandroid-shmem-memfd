name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api: [21, 26, 30, 34]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q android-ndk-*.zip
          echo "NDK=$PWD/android-ndk-r27" >> $GITHUB_ENV
      - name: Build for API ${{ matrix.api }}
        run: |
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          $TOOLCHAIN/bin/aarch64-linux-android${{ matrix.api }}-clang \
            -shared -fPIC -std=c11 -Wall -Wextra \
            -D__ANDROID_API__=${{ matrix.api }} \
            -o libandroid-shmem.so shmem.c -llog -landroid -I.
          echo "✅ API ${{ matrix.api }} OK ($(ls -lh libandroid-shmem.so | awk '{print $5}'))"
